# ============================================================================
# Income AI Assist — iOS build + TestFlight (Codemagic, cloud Mac). No Mac needed.
# Reuses the existing App Store Connect API key integration in the account.
# Web app: single-file index.html (+ manifest, sw, icons) is assembled into www/.
# ============================================================================
workflows:
  ios-income-ai-assist:
    name: Income AI Assist iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ParanormalPulse_ASC      # reuse existing API key
    environment:
      vars:
        BUNDLE_ID: "com.incomeaiassist.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Prepare web assets (assemble www/ from repo root)
        script: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp icon-192.png icon-512.png icon-maskable-512.png www/ 2>/dev/null || true
          ls -la www
      - name: Install JS dependencies
        script: npm install
      - name: Generate the iOS project (Capacitor)
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Force universal device family (iPhone + iPad)
        script: |
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = [^;]*;/TARGETED_DEVICE_FAMILY = "1,2";/g' "$PBX"
          grep -n "TARGETED_DEVICE_FAMILY" "$PBX" || true
      - name: Set Info.plist usage strings + version/build
        script: |
          PLIST="ios/App/App/Info.plist"
          # Camera — to scan a paystub / W-2 for the on-device reader.
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Income AI Assist uses the camera so you can scan a paystub or W-2. Images are read on your device and never uploaded.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Income AI Assist uses the camera so you can scan a paystub or W-2. Images are read on your device and never uploaded.'" "$PLIST"
          # Photo library — to pick an existing paystub/W-2 image.
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Income AI Assist lets you pick a paystub or W-2 photo to read on your device. Images are never uploaded.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Income AI Assist lets you pick a paystub or W-2 photo to read on your device. Images are never uploaded.'" "$PLIST"
          # Standard HTTPS only -> export-compliance exempt.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          BN=$(date +%s)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BN" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BN" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.0" "$PLIST"
          echo "CFBundleVersion=$BN  CFBundleShortVersionString=1.0.0"
      - name: Add PrivacyInfo.xcprivacy (no tracking, required-reason APIs)
        script: |
          PRIV="ios/App/App/PrivacyInfo.xcprivacy"
          cat > "$PRIV" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyTracking</key><false/>
            <key>NSPrivacyTrackingDomains</key><array/>
            <key>NSPrivacyCollectedDataTypes</key><array/>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array><string>CA92.1</string></array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST
          echo "PrivacyInfo.xcprivacy written"
      - name: Set the app icon
        script: |
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          for f in "$ICONSET"/*.png; do cp app-icon-1024.png "$f" && echo "replaced $f"; done
          [ -e "$ICONSET/AppIcon-512@2x.png" ] || cp app-icon-1024.png "$ICONSET/AppIcon-512@2x.png"
      - name: Set up code signing (clean stale + create fresh)
        script: |
          keychain initialize
          app-store-connect list-certificates --json > /tmp/c.json || echo "[]" > /tmp/c.json
          python3 -c "import json;d=json.load(open('/tmp/c.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x.get('id','') for x in (d or []) if isinstance(x,dict)))" > /tmp/cids.txt 2>/dev/null || true
          for ID in $(cat /tmp/cids.txt 2>/dev/null); do echo "revoking cert $ID"; app-store-connect delete-certificate "$ID" || true; done
          app-store-connect list-profiles --json > /tmp/p.json || echo "[]" > /tmp/p.json
          python3 -c "import json;d=json.load(open('/tmp/p.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x.get('id','') for x in (d or []) if isinstance(x,dict)))" > /tmp/pids.txt 2>/dev/null || true
          for ID in $(cat /tmp/pids.txt 2>/dev/null); do echo "deleting profile $ID"; app-store-connect delete-profile "$ID" || true; done
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
